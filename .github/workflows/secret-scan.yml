name: secret-scan

# Definitive, server-side guard: fails the build if secrets or known
# PII / private-workspace markers reach this public repo. Complements the
# CLAUDE.md guidance (which is the only backstop for free-prose
# internal content a pattern scan cannot catch).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets, full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # gitleaks-action is free for public repositories.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pii-markers:
    name: PII / private-marker denylist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan tracked files for banned patterns
        run: |
          set -uo pipefail
          # Patterns that must never appear in this public repo. Tune as the
          # project evolves (add codenames / domains as needed).
          patterns='brownboot\.com|ncdlife\.org|myoikos\.life|/Users/[A-Za-z]|/home/[A-Za-z]|_project-management|_localdocs|(^|[^A-Za-z])bogsy([^A-Za-z]|$)|marmalademail'
          # Exclude the files whose job is to *list* these patterns.
          if git grep -nIE "$patterns" -- . ':!.github/workflows/secret-scan.yml' ':!.gitignore' ':!CLAUDE.md'; then
            echo "::error::Banned PII / private-marker pattern found above — must not be committed to this public repo."
            exit 1
          fi
          echo "OK: no banned patterns in tracked files."
