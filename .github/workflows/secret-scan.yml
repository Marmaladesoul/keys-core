name: secret-scan

# Server-side guard: fails the build if secrets or known PII / private-
# workspace markers reach this public repo. (Free-prose internal content a
# pattern scan can't catch is the author's pre-commit responsibility.)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets, full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Run the gitleaks binary directly (the gitleaks-action requires a paid
      # licence for private org repos; the binary is free and works whether
      # this repo is public or private).
      - name: Install gitleaks
        run: |
          ver="$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | head -1 \
            | sed -E 's/.*"v?([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')"
          echo "gitleaks v$ver"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Scan full history for secrets
        run: gitleaks detect --no-banner --redact --log-opts="--all"

  pii-markers:
    name: PII / private-marker denylist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan tracked files for banned patterns
        run: |
          set -uo pipefail
          # Patterns that must never appear in this public repo. Tune as the
          # project evolves (add codenames / domains as needed).
          patterns='brownboot\.com|ncdlife\.org|myoikos\.life|/Users/[A-Za-z]|/home/[A-Za-z]|_project-management|_localdocs|(^|[^A-Za-z])bogsy([^A-Za-z]|$)|marmalademail'
          # Exclude the files whose job is to *list* these patterns.
          if git grep -nIE "$patterns" -- . ':!.github/workflows/secret-scan.yml' ':!.gitignore' ':!CLAUDE.md'; then
            echo "::error::Banned PII / private-marker pattern found above — must not be committed to this public repo."
            exit 1
          fi
          echo "OK: no banned patterns in tracked files."
