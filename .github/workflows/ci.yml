# CI for the keys-core workspace.
#
# keys-core depends on keepass-core and keepass-merge as git dependencies on
# the public repo, so a plain checkout *builds* with no side-by-side checkout.
# The vault integration tests, however, read KDBX fixtures from a sibling
# keepass-core checkout (resolved relative to each crate as
# ../../../KeepassCore/tests/fixtures), so the build+test job checks that repo
# out alongside this one before running `cargo test`.
# (Flip to crates.io version deps once keepass-core publishes there.)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The vault integration tests resolve KDBX fixtures from a sibling
      # keepass-core checkout (../../../KeepassCore/tests/fixtures, relative to
      # the crate). actions/checkout only places a repo under $GITHUB_WORKSPACE,
      # so check it out into a subdir, then move it up to the sibling path the
      # tests expect. Pinned to a keepass-core commit that carries the fixtures;
      # bump this SHA when the fixtures the tests need change. (Deliberately a
      # real branch commit, decoupled from the Cargo.lock library rev — that rev
      # can point at a rewritten/orphaned commit that won't stay fetchable.)
      - name: Check out keepass-core test fixtures
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Marmaladesoul/keepass-core
          ref: 44aa5d9b15edbac84e451f89e465c3907da6db14
          path: _keepass-core
          persist-credentials: false
      - name: Stage keepass-core at the sibling path the tests resolve
        run: mv "$GITHUB_WORKSPACE/_keepass-core" "$(dirname "$GITHUB_WORKSPACE")/KeepassCore"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --workspace --all-features --no-fail-fast

      - name: doc
        run: cargo doc --workspace --no-deps --all-features

      # keyhole scenarios: end-to-end behaviour proofs one rung below the GUI
      # (see keyhole/DESIGN.md). keepassxc-cli seeds the cross-implementation
      # honesty scenarios — kept on purpose so we test real-world KDBX files,
      # not just our own.
      - name: Install keepassxc-cli
        run: sudo apt-get update && sudo apt-get install -y keepassxc

      - name: keyhole scenarios
        run: ./keyhole/scenarios/run-all.sh

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # Checks Cargo.lock against the RustSec Advisory Database for known CVEs
    # in any transitive dependency. Fast, and a no-brainer for a workspace
    # that handles credentials and owns the iroh transport layer.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    # Stricter than cargo audit: enforces a licence allowlist, a source
    # allowlist (crates.io + the keepass-core git repo), a banned-crates list
    # (native-tls), and surfaces duplicate versions. Config in deny.toml.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          arguments: --all-features
