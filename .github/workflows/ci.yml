# CI for the keys-core workspace.
#
# keys-core depends on keepass-core and keepass-merge as git dependencies on
# the public repo, so a plain checkout builds with no side-by-side checkout.
# (Flip to crates.io version deps once keepass-core publishes there.)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --workspace --all-features --no-fail-fast

      - name: doc
        run: cargo doc --workspace --no-deps --all-features

      # keyhole scenarios: end-to-end behaviour proofs one rung below the GUI
      # (see keyhole/DESIGN.md). keepassxc-cli seeds the cross-implementation
      # honesty scenarios — kept on purpose so we test real-world KDBX files,
      # not just our own.
      - name: Install keepassxc-cli
        run: sudo apt-get update && sudo apt-get install -y keepassxc

      - name: keyhole scenarios
        run: ./keyhole/scenarios/run-all.sh

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # Checks Cargo.lock against the RustSec Advisory Database for known CVEs
    # in any transitive dependency. Fast, and a no-brainer for a workspace
    # that handles credentials and owns the iroh transport layer.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    # Stricter than cargo audit: enforces a licence allowlist, a source
    # allowlist (crates.io + the keepass-core git repo), a banned-crates list
    # (native-tls), and surfaces duplicate versions. Config in deny.toml.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          arguments: --all-features
