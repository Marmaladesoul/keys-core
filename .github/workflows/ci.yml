# CI for the private keys-core (keys-ffi) workspace.
#
# Wrinkle: keys-ffi currently depends on keepass-core and keepass-merge via
# *path* dependencies (`../../../KeepassCore/crates/keepass-core`). That path
# doesn't exist inside a single-repo checkout, so CI must check out both
# repos side-by-side to match the local developer layout.
#
# keepass-core is public so no authentication is required to check it out.
#
# Once keepass-core publishes to crates.io (v0.1+), flip the dependencies in
# crates/keys-ffi/Cargo.toml from path to version deps — at that point the
# side-by-side checkout step goes away entirely.
#
# Linux-only on this private repo to conserve the 2,000 minute/month
# free-plan Actions budget (which applies to private repos only; the
# public keepass-core repo has unlimited minutes).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      # 1. Check out keys-core into KeysCore/
      - name: Checkout keys-core
        uses: actions/checkout@v6
        with:
          path: KeysCore

      # 2. Check out keepass-core into KeepassCore/ (sibling directory).
      #    No token needed — the repo is public.
      - name: Checkout keepass-core
        uses: actions/checkout@v6
        with:
          repository: Marmaladesoul/keepass-core
          path: KeepassCore

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: KeysCore

      - name: fmt check
        working-directory: KeysCore
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: KeysCore
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: test
        working-directory: KeysCore
        run: cargo test --workspace --all-features --no-fail-fast
