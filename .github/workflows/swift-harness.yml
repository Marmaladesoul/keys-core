# Swift harness CI for keys-ffi.
#
# Runs on macOS, paid for private repos at 10x the Linux rate. Triggered
# only on demand and by a weekly heartbeat to stay inside the 2,000
# minute/month free-tier budget — Phase 5 of the Keys-Mac integration
# exhausted that budget in a single day with the previous per-push +
# per-PR triggers. Linux Rust-only checks (clippy, fmt, cargo test) live
# in `ci.yml` and continue to gate every push and PR — that's the
# per-commit signal. This workflow is the deliberate "macOS-side
# binding generation still works" check, hit before merging an
# FFI-shape PR or by the Monday heartbeat.
#
# What it proves: the proc-macro uniffi scaffolding compiles for both
# Apple architectures, lipo'ing into a universal staticlib succeeds, the
# `uniffi-bindgen-swift` step regenerates Swift sources idempotently, and
# a SwiftPM consumer can call into the FFI via the generated module.
#
# Local Mac dev workflow gives continuous pre-merge coverage: Keys-Mac's
# Xcode pre-build phase invokes `bindgen/build-swift.sh`, which exercises
# the same toolchain step this workflow does — so binding regressions
# surface in a Mac dev's Xcode build well before reaching production.

name: Swift harness

on:
  workflow_dispatch:
  schedule:
    # 04:07 UTC Monday — off-peak, off-:00 to spread fleet load.
    - cron: '7 4 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  swift-harness:
    name: build + swift test (macOS universal)
    runs-on: macos-14
    steps:
      - name: Checkout keys-core
        uses: actions/checkout@v4
        with:
          path: KeysCore

      - name: Checkout keepass-core
        uses: actions/checkout@v4
        with:
          repository: Marmaladesoul/keepass-core
          path: KeepassCore

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: KeysCore

      - name: Build Swift bindings
        working-directory: KeysCore
        run: bindgen/build-swift.sh

      - name: Idempotency — re-run produces identical tree
        working-directory: KeysCore
        run: |
          before=$(find swift-harness/Sources/KeysCoreFFI swift-harness/KeysCoreFFI.xcframework \
            -type f \( ! -name '.DS_Store' \) -print0 \
            | sort -z | xargs -0 shasum -a 256 | shasum -a 256)
          bindgen/build-swift.sh
          after=$(find swift-harness/Sources/KeysCoreFFI swift-harness/KeysCoreFFI.xcframework \
            -type f \( ! -name '.DS_Store' \) -print0 \
            | sort -z | xargs -0 shasum -a 256 | shasum -a 256)
          if [[ "$before" != "$after" ]]; then
            echo "Bindgen output changed on second run — not idempotent."
            echo "before: $before"
            echo "after:  $after"
            exit 1
          fi

      - name: swift test
        working-directory: KeysCore/swift-harness
        run: swift test
